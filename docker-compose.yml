services:
  # ─── Reverse proxy ────────────────────────────────────────────────────────
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /media/krioasns/VIDEOS/videos:/srv/external-videos:ro
      - ./media:/app/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  # ─── React frontend (production build, ARM64-safe) ─────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_RECEIPT_BASE_URL: https://kianpotpi.taile4f97e.ts.net
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── FastAPI backend ───────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://fims:fims@postgres:5432/fims
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      EMAIL_ENCRYPTION_KEY: "${EMAIL_ENCRYPTION_KEY:-}"
      MEDIA_ROOT: /app/media
      ENVIRONMENT: development
      VIDEO_PI_URL: "${VIDEO_PI_URL:-}"
    volumes:
      - ./backend:/app
      - ./media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Celery worker (background jobs: PDF parsing, import pipeline) ─────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://fims:fims@postgres:5432/fims
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      EMAIL_ENCRYPTION_KEY: "${EMAIL_ENCRYPTION_KEY:-}"
      MEDIA_ROOT: /app/media
      VIDEO_PI_URL: "${VIDEO_PI_URL:-}"
    volumes:
      - ./backend:/app
      - ./media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.worker.celery_app worker --loglevel=info -Q default,imports,reports
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Celery beat (scheduled tasks: nightly reports, cleanup) ──────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://fims:fims@postgres:5432/fims
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      EMAIL_ENCRYPTION_KEY: "${EMAIL_ENCRYPTION_KEY:-}"
      MEDIA_ROOT: /app/media
    volumes:
      - ./backend:/app
      - ./media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.worker.celery_app beat --loglevel=info
    deploy:
      resources:
        limits:
          memory: 128M

  # ─── PostgreSQL 17 (tuned for 4GB Pi) ────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fims
      POSTGRES_PASSWORD: fims
      POSTGRES_DB: fims
    # Memory-conservative settings for Raspberry Pi 4B 4GB
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=16MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=1GB
      -c max_connections=50
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fims"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"   # expose for local tools like DBeaver
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Redis 7 (Celery broker + cache) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"   # expose for local inspection
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  redis_data:
  caddy_data:
  caddy_config:
